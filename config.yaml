# ===============================================================
# WebUntis Sync — Backend-Konfiguration
# ===============================================================
# Dieses Skript holt deinen Stundenplan aus WebUntis und legt ihn als
# stundenplan.json ab, damit die App (../webuntis-app/) ihn lesen kann.
# ===============================================================

# --- WebUntis Server ---------------------------------------------
webuntis:
  server: "hakzell-hlpzell.webuntis.com"
  school: "hakzell-hlpzell"        # URL-Slug (aus ?school=... in der Adresse)
  # Falls Login-Fehler: stattdessen "BHAK Zell am See, HLP Zell am See" probieren.

# --- Sync-Zeitraum -----------------------------------------------
sync:
  weeks_ahead: 4
  weeks_back: 1
  timezone: "Europe/Vienna"

# --- Output-Dateien ----------------------------------------------
outputs:
  json:
    enabled: true
  ics:
    enabled: false

# --- Kalender-Metadaten (nur fuer ICS, falls aktiviert) -----------
calendar:
  name: "Schule (WebUntis)"
  description: "Automatisch generiert aus WebUntis"

# --- Anzeige-Optionen (nur fuer ICS) -----------------------------
display:
  title_format: "{subject} ({room})"
  description_format: |
    Lehrer: {teacher}
    Raum: {room}
    Klasse: {class}
  location_format: "{room}"
  include_breaks: false

# --- Fach-Konfiguration ------------------------------------------
# Die Faecher hier kannst du jederzeit erweitern/anpassen — die App liest
# die Farben als Default; pro Geraet kannst du sie in den App-Settings
# ueberschreiben.
#
# Tipp BHAK-spezifisch: ergaenze hier deine Faecher wie BW, RW, WINF, AM,
# DV, etc. mit den passenden Farben.
subjects:
  Mathematik:
    color: "#3498db"
    aliases: ["M", "Mathe", "MAM", "AM", "Angewandte Mathematik"]
  Deutsch:
    color: "#e74c3c"
    aliases: ["D", "DEU"]
  Englisch:
    color: "#f1c40f"
    aliases: ["E", "ENG", "BE", "Business English"]
  Geschichte:
    color: "#8e44ad"
    aliases: ["GSK", "GS", "GWK"]
  Sport:
    color: "#2ecc71"
    aliases: ["BSPK", "LUM", "BEW"]
  Betriebswirtschaft:
    color: "#16a085"
    aliases: ["BW", "BWL"]
  Rechnungswesen:
    color: "#1abc9c"
    aliases: ["RW", "UNRW"]
  Wirtschaftsinformatik:
    color: "#34495e"
    aliases: ["WINF", "INF", "DV"]
  _default:
    color: "#95a5a6"

# --- Filter ------------------------------------------------------
filter:
  exclude_subjects: []
  exclude_teachers: []
  exclude_classes: []
  exclude_weekdays: []

# --- Vertretungen, Entfaelle, Raumwechsel -----------------------
substitutions:
  cancelled:
    mode: "mark"
    title_prefix: "⊘ ENTFALL: "
    color: "#7f8c8d"
  substitute:
    title_prefix: "↻ "
    show_original_teacher: true
    color: "#e67e22"
  room_change:
    title_prefix: "⌂ "
    show_original_room: true
  additional:
    title_prefix: "+ "
    color: "#16a085"

# --- Klausuren ---------------------------------------------------
exams:
  enabled: true
  title_prefix: "📝 KLAUSUR: "
  color: "#c0392b"
  reminder_minutes: 1440

homework:
  enabled: false
  title_prefix: "✎ HÜ: "
