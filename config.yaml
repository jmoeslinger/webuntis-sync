    code: "AIMI"
    name: "Mag. Michael Aigner"
  "165":
    code: "BODN"
    name: "Dr. Gudrun Bodner"
  "168":
    code: "EDEH"
    name: "Mag. Harald Eder"
  "174":
    code: "GRUB"
    name: "MMag. Peter Gruber"
  "186":
    code: "HIRS"
    name: "Mag. Bernd Hirschbichler"
  "198":
    code: "NIND"
    name: "Mag. Miriam Nindl-Scharler"
  "204":
    code: "RASS"
    name: "Mag. Peter Rasser"
  "213":
    code: "SEME"
    name: "Mag. Michaela Semler"
  "216":
    code: "SINN"
    name: "Mag. Tanja Sinnhuber"
  "219":
    code: "SNEP"
    name: "MMag. Johannes Schnepf"
  "225":
    code: "SPIZ"
    name: "Mag. Sabine Spitzer"
  "231":
