# ===============================================================
# WebUntis Sync — Backend-Konfiguration (BHAK Zell am See, 5HBM o.ae.)
# ===============================================================
# Liefert stundenplan.json fuer die App (webuntis-app).
# ===============================================================

# --- WebUntis ----------------------------------------------------
webuntis:
  server: "hakzell-hlpzell.webuntis.com"
  school: "hakzell-hlpzell"

# --- Sync-Zeitraum ----------------------------------------------
sync:
  weeks_ahead: 4
  weeks_back: 1
  timezone: "Europe/Vienna"

# --- Output-Dateien ---------------------------------------------
outputs:
  json:
    enabled: true
  ics:
    enabled: false

# --- ICS-only Felder (ignoriert solange ics.enabled=false) ------
calendar:
  name: "Schule (WebUntis)"
  description: "Automatisch generiert aus WebUntis"

display:
  title_format: "{subject} ({room})"
  description_format: |
    Lehrer: {teacher}
    Raum: {room}
    Klasse: {class}
  location_format: "{room}"
  include_breaks: false

# --- Fach-Konfiguration -----------------------------------------
# Pro Fach: Hauptfarbe (HEX) + alle Schreibweisen, die WebUntis liefert.
# Die App liest diese als Default-Farben; pro Geraet kannst du sie ueber-
# schreiben (Einstellungen -> Fach-Farben).
subjects:
  Angewandtes Programmieren:
    color: "#3498DB"
    aliases: ["APR"]
  Bewegung und Sport:
    color: "#27AE60"
    aliases: ["BESPK", "BSPK", "LUM"]
  Betriebswirtschaft:
    color: "#1F4E79"
    aliases: ["BW", "BWL", "Betriebswirtschaftslehre"]
  Deutsch:
    color: "#C0392B"
    aliases: ["D", "DEU"]
  Englische Wirtschaftssprache:
    color: "#E67E22"
    aliases: ["ENWS", "E", "ENG", "BE"]
  Geografie und Wirtschaftskunde:
    color: "#16A085"
    aliases: ["GEO", "GWK"]
  Internet- und Content-Management:
    color: "#00BCD4"
    aliases: ["IMCM"]
  Mathematik:
    color: "#5B4FE9"
    aliases: ["MAM", "M", "Mathe", "AM", "Angewandte Mathematik"]
  Naturwissenschaften:
    color: "#00838F"
    aliases: ["NW3", "NW", "NaWi", "Biologie", "Physik", "Chemie"]
  Office Management:
    color: "#F39C12"
    aliases: ["OMAI"]
  Politische Bildung und Geschichte:
    color: "#8E44AD"
    aliases: ["PBGW", "GSK", "GS"]
  Religion (kath.):
    color: "#9B59B6"
    aliases: ["RK"]
  Unternehmensrechnungen:
    color: "#B71C5C"
    aliases: ["UNCO", "RW", "UNRW", "Rechnungswesen"]
  Wirtschaftsinformatik:
    color: "#0D47A1"
    aliases: ["WIDS", "WINF", "INF", "DV"]
  _default:
    color: "#95A5A6"

# --- Lehrer-Mapping ---------------------------------------------
# WebUntis liefert Schueler-Accounts nur die internen IDs der Lehrer
# (keine Klartextnamen). Hier mappen wir auf die in der Schule
# verwendeten Kuerzel + den vollen Namen (fuer die Detailansicht).
# IDs ermitteln: einmaliger Sync, dann steht im stundenplan.json
# bei jedem Eintrag "teachers": ["#123"] — diese 123 hierher uebernehmen.
teachers:
