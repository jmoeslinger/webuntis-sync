# --- Filter ------------------------------------------------------
filter:
  exclude_subjects: []
  exclude_teachers: []
  exclude_classes: []
  exclude_weekdays: []

# --- Vertretungen, Entfaelle, Raumwechsel ----------------------
substitutions:
  cancelled:
    mode: "mark"
    title_prefix: "⊘ ENTFALL: "
    color: "#7F8C8D"
  substitute:
    title_prefix: "↻ "
    show_original_teacher: true
    color: "#E67E22"
  room_change:
    title_prefix: "⌂ "
    show_original_room: true
  additional:
    title_prefix: "+ "
    color: "#16A085"

# --- Klausuren ---------------------------------------------------
exams:
  enabled: true
  title_prefix: "📝 KLAUSUR: "
  color: "#C0392B"
  reminder_minutes: 1440

homework:
  enabled: false
  title_prefix: "✎ HÜ: "
